services:
  - type: web
    name: oseong-club-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: oseong2026
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: club-data
      mountPath: /opt/render/project/src
      sizeGB: 1
